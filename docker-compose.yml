# ==============================================================
# INOVAR - Docker Compose (Local Stack)
# Uso: docker-compose up -d
# ==============================================================
version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inovar-app
    restart: always
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      # Persistent data - bind mounts to infra/data
      - ./infra/data/db:/app/data/db       # SQLite database
      - ./infra/data/uploads:/app/data/uploads # File uploads
      - ./infra/data/certs:/app/data/certs   # Digital certificates
    env_file:
      - .env.docker
    environment:
      # Override specific paths for Docker environment
      - UPLOAD_DIR=/app/data/uploads
      - FRONTEND_DIST=/app/client/dist
      - DATABASE_URL=/app/data/db/inovar.db
      - BRIDGE_SCRIPT_PATH=/app/infra/scripts/bridge.py
      - PYTHON_CMD=python3
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
