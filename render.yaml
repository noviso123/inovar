services:
  - type: web
    name: inovar-backend
    env: docker
    region: oregon
    plan: free
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
