services:
  - type: web
    name: inovar-backend-liberated
    env: go
    rootDir: backend
    buildCommand: go build -o server main.go
    startCommand: ./server
    plan: free # or your preferred plan
    region: ohio # Adjust to your preference
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false # Set this in the dashboard for security
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        value: https://bxbupbnjcingfvjszrau.supabase.co
      - key: SUPABASE_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*" # Liberated - allow all by default
